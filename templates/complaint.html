<!DOCTYPE html>
<html>
<head>
    <title>Sahara Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">237 Engr Regt Women Sahara Portal</div>

<div class="container">

    <p class="subtitle">Welfare & grievance redressal platform</p>

    <audio id="alertSound" src="/static/alert.mp3"></audio>

    <form id="complaintForm">

    <div class="card">
        <h3>Basic Details</h3>
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="wo" placeholder="Husband Rank & Name">
        <input type="text" name="contact" placeholder="Contact Number" required>
        <input type="text" name="address" placeholder="Address">
        <input type="email" name="email" placeholder="Email">
        <input type="text" name="unit" placeholder="Unit">
        <input type="text" name="quarter" placeholder="Quarter">
    </div>

    <div class="card">
        <h3>Select Category</h3>

        <div class="grid">
            <div class="box" onclick="selectCategory(event,'ration')">🍽️ Ration</div>
            <div class="box" onclick="selectCategory(event,'accommodation')">🏠 Accommodation</div>
            <div class="box" onclick="selectCategory(event,'welfare')">👨‍👩‍👧 Welfare</div>
            <div class="box" onclick="selectCategory(event,'safety')">🛡️ Safety</div>
        </div>

        <input type="hidden" name="category" id="category">
        <input type="hidden" name="subcategory" id="subcategory">

        <div id="subcategoryBox"></div>
    </div>

    <div class="card">
        <h3>Describe Your Concern</h3>

        <textarea name="complaint" required></textarea>

        <br>
        <button type="button" onclick="startRecording()">🎤 Record</button>
        <button type="button" onclick="stopRecording()">⏹ Stop</button>

        <br><br>
        <audio id="audioPlayback" controls></audio>

        <input type="hidden" id="audioData" name="audio_data">
    </div>

    <button type="submit" class="submit">Submit</button>

    </form>

</div>

<script>

// CATEGORY
let options = {
    ration: ["Non-availability","Poor quality"],
    accommodation: ["Water","Electricity"],
    welfare: ["Family issue","Education"],
    safety: ["Harassment","Security"]
};

function selectCategory(e, cat) {
    document.getElementById("category").value = cat;
}

// 🎤 AUDIO
let mediaRecorder;
let audioChunks = [];

async function startRecording() {
    try {
        let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

        mediaRecorder.onstop = () => {
            let blob = new Blob(audioChunks, { type: 'audio/webm' });
            let url = URL.createObjectURL(blob);
            document.getElementById("audioPlayback").src = url;

            let reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = () => {
                document.getElementById("audioData").value = reader.result;
            };
        };

        mediaRecorder.start();
        alert("Recording started");

    } catch (err) {
        alert("Mic permission allow karo!");
        console.log(err);
    }
}

function stopRecording() {
    if (mediaRecorder) {
        mediaRecorder.stop();
        alert("Recording stopped");
    }
}

// ✅ FORM SUBMIT (IMPORTANT FIX)
document.getElementById("complaintForm").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("/complaint", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            alert("Complaint Submitted! ID: " + data.id);
            document.getElementById("complaintForm").reset();
        } else {
            alert("Error: " + data.message);
        }
    })
    .catch(err => {
        alert("Submission failed");
        console.log(err);
    });
});

</script>

</body>
</html>
