<link rel="stylesheet" href="/static/style.css">

<div class="navbar">Track Complaint</div>

<div class="container">
<div class="card">

<form method="POST">
    <input name="cid" placeholder="Enter Complaint ID">
    <button type="submit">Track</button>
</form>

{% if data %}
    <h3>Status:</h3>
    <p><b>ID:</b> {{data[1]}}</p>
    <p><b>Complaint:</b> {{data[9]}}</p>
    <p><b>Reply:</b> {{data[10]}}</p>
{% endif %}

</div>
</div>
