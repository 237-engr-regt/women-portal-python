<!DOCTYPE html>
<html>
<head>
    <title>Track Complaint</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">Track Complaint</div>

<div class="container">

    <div class="card">

        <h2 style="text-align:center;">Track Your Complaint</h2>

        <!-- 🔍 INPUT -->
        <input id="complaint_id" placeholder="Enter Complaint ID (e.g. CMP12345)">
        
        <button onclick="trackComplaint()" class="submit" style="margin-top:10px;">
            Track
        </button>

        <hr style="margin:20px 0;">

        <!-- RESULT -->
        <div id="result"></div>

    </div>

</div>

<script>

// 🔥 YOUR GOOGLE SCRIPT URL
const SHEET_API = "https://script.google.com/macros/s/AKfycbwULvlFiZY8fpezE-lVzA0MRMtLysDlzzQM_GJ2GjhE7Zb33EE7N2-MA_4gUSTBQvetDg/exec";

function trackComplaint(){

    let id = document.getElementById("complaint_id").value.trim();
    let result = document.getElementById("result");

    if(!id){
        alert("Enter Complaint ID");
        return;
    }

    result.innerHTML = "Loading...";

    fetch(SHEET_API)
    .then(res => res.json())
    .then(data => {

        let found = null;

        for(let i = 1; i < data.length; i++){

            // Column mapping (IMPORTANT)
            // 0 = Complaint ID
            // 1 = Name
            // 2 = Contact
            // 3 = Complaint
            // 4 = Category
            // 5 = Subcategory
            // 6 = Date

            if(data[i][0] == id){
                found = data[i];
                break;
            }
        }

        if(found){

            result.innerHTML = `
                <h3 style="color:green;">✅ Complaint Found</h3>

                <p><b>Complaint ID:</b> ${found[0]}</p>
                <p><b>Name:</b> ${found[1]}</p>
                <p><b>Contact:</b> ${found[2]}</p>

                <p><b>Complaint:</b><br>${found[3]}</p>

                <p><b>Category:</b> ${found[4]}</p>
                <p><b>Subcategory:</b> ${found[5]}</p>

                <p><b>Date:</b> ${found[6]}</p>
            `;
        }
        else{
            result.innerHTML = "<p style='color:red; font-weight:bold;'>❌ No complaint found</p>";
        }

    })
    .catch(err => {
        result.innerHTML = "<p style='color:red;'>Error loading data</p>";
        console.log(err);
    });
}

</script>

</body>
</html>
