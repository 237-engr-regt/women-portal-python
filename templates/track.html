<!DOCTYPE html>
<html>
<head>
    <title>Track Complaint</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">Track Complaint</div>

<div class="container">

    <div class="card">

        <h2 style="text-align:center;">Track Your Complaint</h2>

        <!-- 🔍 TRACK FORM -->
        <form id="trackForm">
            <input name="complaint_id" placeholder="Enter Complaint ID (e.g. CMP12345)" required>
            <button type="submit" class="submit" style="margin-top:10px;">Track</button>
        </form>

        <hr style="margin:20px 0;">

        <!-- RESULT -->
        <div id="result"></div>

    </div>

</div>

<script>

const SHEET_API = "https://script.google.com/macros/s/AKfycbx9YUvCpKgwBrFiMfi3aFYBCCsnFavoc88OWFlgsBKjPL5df29dn0WrARbstL4hTXwRzg/exec";

document.getElementById("trackForm").addEventListener("submit", function(e){
    e.preventDefault();

    let id = document.querySelector("input[name='complaint_id']").value.trim();

    document.getElementById("result").innerHTML = "⏳ Loading...";

    fetch(SHEET_API)
    .then(res => res.json())
    .then(data => {

        let found = null;

        for(let i = 1; i < data.length; i++){
            if(data[i][0] === id){
                found = data[i];
                break;
            }
        }

        if(found){
            document.getElementById("result").innerHTML = `
                <h3 style="color:green;">✅ Complaint Found</h3>
                <p><b>Complaint ID:</b> ${found[0]}</p>
                <p><b>Name:</b> ${found[1]}</p>
                <p><b>Contact:</b> ${found[2]}</p>
                <p><b>Complaint:</b> ${found[3]}</p>
                <p><b>Category:</b> ${found[4]}</p>
                <p><b>Subcategory:</b> ${found[5]}</p>
                <p><b>Date:</b> ${found[6]}</p>
            `;
        } else {
            document.getElementById("result").innerHTML = `
                <p style="color:red; font-weight:bold;">
                ❌ No complaint found with this ID
                </p>
            `;
        }

    })
    .catch(err => {
        console.error(err);
        document.getElementById("result").innerHTML = `
            <p style="color:red;">❌ Error loading data</p>
        `;
    });

});

</script>

</body>
</html>
