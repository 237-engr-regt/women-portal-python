<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- ✅ WEBSITE TITLE -->
    <title>E2A WOMEN SAHARA PORTAL</title>

    <!-- ✅ OFFICIAL FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

    <style>

        body{
            margin:0;
            font-family:'Poppins', sans-serif;
            background:#eef2ef;
        }

        /* 🔥 NAVBAR */
        .navbar{
            background:#2e5d46;
            color:white;
            text-align:center;
            padding:24px;
            box-shadow:0 2px 12px rgba(0,0,0,0.18);
        }

        /* ✅ OFFICIAL TITLE */
        .fancy-title{
            font-family:'Poppins', sans-serif;
            font-size:38px;
            font-weight:700;
            letter-spacing:1px;
            text-transform:uppercase;
        }

        .container{
            display:flex;
            justify-content:center;
            margin-top:80px;
        }

        .card{
            background:white;
            padding:35px;
            border-radius:16px;
            width:420px;
            text-align:center;
            box-shadow:0px 5px 18px rgba(0,0,0,0.12);
        }

        .card h2{
            margin-bottom:10px;
            font-size:36px;
            color:#111;
        }

        .card p{
            color:#555;
            margin-bottom:25px;
            font-size:18px;
        }

        .btn{
            display:block;
            width:100%;
            padding:15px;
            margin:14px 0;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
            transition:0.3s;
            font-weight:600;
            font-family:'Poppins', sans-serif;
        }

        .submit-btn{
            background:#2e5d46;
            color:white;
        }

        .track-btn{
            background:#3b82f6;
            color:white;
        }

        .admin-btn{
            background:#444;
            color:white;
        }

        .btn:hover{
            transform:scale(1.02);
            opacity:0.93;
        }

        a{
            text-decoration:none;
        }

    </style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="navbar">

    <div class="fancy-title">
        E2A WOMEN SAHARA PORTAL
    </div>

</div>

<div class="container">

    <div class="card">

        <h2>Welcome</h2>

        <p>
            Submit and track your complaints easily.
        </p>

        <!-- ✅ SUBMIT -->
        <a href="/complaint">
            <button class="btn submit-btn">
                Submit Complaint
            </button>
        </a>

        <!-- ✅ TRACK -->
        <a href="/track">
            <button class="btn track-btn">
                Track Complaint
            </button>
        </a>

        <!-- ✅ ADMIN -->
        <a href="/admin">
            <button class="btn admin-btn">
                Admin Panel
            </button>
        </a>

    </div>

</div>

</body>
</html>
