<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<table border="1" width="100%" cellpadding="10">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Complaint</th>
    <th>Reply</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[9]}}</td>
    <td>
        <form action="/reply/{{row[1]}}" method="POST">
            <input name="reply">
            <button>Send</button>
        </form>
    </td>
</tr>
{% endfor %}

</table>

</div>
</div>

<!-- 🔊 SOUND -->
<audio id="alertSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
    // 🔁 Auto refresh every 5 sec
    setInterval(function(){
        location.reload();
    }, 5000);

    // 🔊 Play sound if new complaint added
    let lastCount = document.querySelectorAll("table tr").length;

    setInterval(function(){
        let currentCount = document.querySelectorAll("table tr").length;

        if(currentCount > lastCount){
            document.getElementById("alertSound").play();
        }

        lastCount = currentCount;
    }, 5000);
</script>

</body>
</html>
