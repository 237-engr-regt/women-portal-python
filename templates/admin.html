<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<table border="1" width="100%" cellpadding="10">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Complaint</th>
    <th>Reply</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[9]}}</td>
    <td>
        <form action="/reply/{{row[1]}}" method="POST">
            <input name="reply" placeholder="Type reply">
            <button>Send</button>
        </form>
    </td>
</tr>
{% endfor %}

</table>

</div>
</div>

<!-- 🔊 SOUND -->
<audio id="alertSound" src="/static/alert.mp3"></audio>

<script>
let lastCount = {{ data|length }};

// 🧠 Check new complaints (no full reload)
setInterval(() => {
    fetch('/check')
    .then(res => res.json())
    .then(res => {

        if (res.count > lastCount) {
            console.log("New complaint आया!");

            // 🔊 Play sound
            document.getElementById("alertSound").play();

            // 🔄 Reload only when new data
            setTimeout(() => {
                location.reload();
            }, 1000);
        }

    });
}, 5000);
</script>

</body>
</html>
